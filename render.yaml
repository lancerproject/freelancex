# Render Blueprint for the FreelanceX (Xwork) Next.js app.
# In Render: New + → Blueprint → connect this repo → Render reads this file.
# The four secret env vars below are marked sync:false, so Render will prompt
# you to paste them during setup (they are NOT stored in the repo).
services:
  - type: web
    name: freelancex
    runtime: node
    plan: starter # ~$7/mo, always-on. Change to "free" in the dashboard to test for free (site sleeps when idle).
    branch: main
    autoDeploy: true # every push to main redeploys automatically
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
